<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Dados</title>
</head>
<body>
    <h1>Dados Aleatórios</h1>
    <label for="quantidade">Quantidade de Dados:</label>
    <input type="number" id="quantidade" value="1" min="1">
    <button onclick="mostrarDados()">Gerar Dados</button>
    <div id="dados"></div>

    <script>
        function gerarDados(quantidade) {
            var nomes = ["João", "Maria", "Pedro", "Ana", "Carlos"];
            var sobrenomes = ["Silva", "Santos", "Oliveira", "Souza", "Pereira"];
            var idades = [25, 30, 35, 40, 45];
            var cpfs = ["123.456.789-00", "987.654.321-00", "234.567.890-00", "543.210.987-00", "876.543.210-00"];
            var telefones = ["(11) 91234-5678", "(21) 98765-4321", "(31) 87654-3210", "(41) 76543-2109", "(51) 65432-1098"];
            var coresPelicula = ["Preto", "Azul", "Verde", "Vermelho", "Cinza"];
            var enderecos = ["Rua A, 123", "Av. B, 456", "Praça C, 789", "Alameda D, 1011", "Travessa E, 1213"];
            var nomesPais = ["José", "Ana", "Paulo", "Marta", "Luiz"];
            var sobrenomesPais = ["Ribeiro", "Oliveira", "Santos", "Silva", "Costa"];
            var cidades = ["São Paulo", "Rio de Janeiro", "Belo Horizonte", "Porto Alegre", "Salvador"];
            var bairros = ["Centro", "Copacabana", "Pinheiros", "Barra da Tijuca", "Boa Viagem"];
            var numerosCartao = ["1234 5678 9012 3456", "9876 5432 1098 7654", "2468 1357 8024 6913", "3691 2580 1473 5826", "8024 6913 3579 2468"];
            var saldos = ["R$ 1000,00", "R$ 5000,00", "R$ 750,00", "R$ 3000,00", "R$ 20000,00"];
            var horasNascimento = ["08:00", "10:30", "13:45", "15:20", "19:10"];
            var quantidadeIrmaos = [0, 1, 2, 3, 4];

            var dadosGerados = [];

            for (var i = 0; i < quantidade; i++) {
                var indiceNome = Math.floor(Math.random() * nomes.length);
                var indiceSobrenome = Math.floor(Math.random() * sobrenomes.length);
                var idade = idades[Math.floor(Math.random() * idades.length)];
                var cpf = cpfs[Math.floor(Math.random() * cpfs.length)];
                var telefone = telefones[Math.floor(Math.random() * telefones.length)];
                var corPelicula = coresPelicula[Math.floor(Math.random() * coresPelicula.length)];
                var endereco = enderecos[Math.floor(Math.random() * enderecos.length)];
                var nomePai = nomesPais[Math.floor(Math.random() * nomesPais.length)];
                var sobrenomePai = sobrenomesPais[Math.floor(Math.random() * sobrenomesPais.length)];
                var nomeMae = nomesPais[Math.floor(Math.random() * nomesPais.length)]; // Mesma lista de nomes para mães
                var sobrenomeMae = sobrenomesPais[Math.floor(Math.random() * sobrenomesPais.length)];
                var cidade = cidades[Math.floor(Math.random() * cidades.length)];
                var bairro = bairros[Math.floor(Math.random() * bairros.length)];
                var numeroCartao = numerosCartao[Math.floor(Math.random() * numerosCartao.length)];
                var saldo = saldos[Math.floor(Math.random() * saldos.length)];
                var horaNascimento = horasNascimento[Math.floor(Math.random() * horasNascimento.length)];
                var quantidadeIrmaos = quantidadeIrmaos[Math.floor(Math.random() * quantidadeIrmaos.length)];

                dadosGerados.push({
                    nome: nomes[indiceNome],
                    sobrenome: sobrenomes[indiceSobrenome],
                    idade: idade,
                    cpf: cpf,
                    telefone: telefone,
                    corPelicula: corPelicula,
                    endereco: endereco,
                    nomePai: nomePai + " " + sobrenomePai,
                    nomeMae: nomeMae + " " + sobrenomeMae,
                    cidade: cidade,
                    bairro: bairro,
                    numeroCartao: numeroCartao,
                    saldo: saldo,
                    horaNascimento: horaNascimento,
                    quantidadeIrmaos: quantidadeIrmaos
                });
            }

            return dadosGerados;
        }

        function mostrarDados() {
            var quantidade = parseInt(document.getElementById("quantidade").value);
            var dados = gerarDados(quantidade);
            var dadosHTML = "";

            for (var i = 0; i < dados.length; i++) {
                dadosHTML += "<p><strong>Nome:</strong> " + dados[i].nome + " " + dados[i].sobrenome + "</p>" +
                             "<p><strong>Idade:</strong> " + dados[i].idade + "</p>" +
                             "<p><strong>CPF:</strong> " + dados[i].cpf + "</p>" +
                             "<p><strong>Telefone:</strong> " + dados[i].telefone + "</p>" +
                             "<p><strong>Endereço:</strong> " + dados[i].endereco + "</p>" +
                             "<p><strong>Nome do Pai:</strong> " + dados[i].nomePai + "</p>" +
                             "<p><strong>Nome da Mãe:</strong> " + dados[i].nomeMae + "</p>" +
                             "<p><strong>Cidade:</strong> " + dados[i].cidade + "</p>" +
                             "<p><strong>Bairro:</strong> " + dados[i].bairro + "</p>" +
                             "<p><strong>Número do Cartão de Crédito:</strong> " + dados[i].numeroCartao + "</p>" +
                             "<p><strong>Saldo da Conta Bancária:</strong> " + dados[i].saldo + "</p>" +
                             "<p><strong>Hora de Nascimento:</strong> " + dados[i].horaNascimento + "</p>" +
                             "<p><strong>Quantidade de Irmãos:</strong> " + dados[i].quantidadeIrmaos + "</p>" +
                             "<p><strong>Cor da Película:</strong> " + dados[i].corPelicula + "</p><hr>";
            }

            document.getElementById("dados").innerHTML = dadosHTML;
        }
    </script>
    
</body>
</html>
